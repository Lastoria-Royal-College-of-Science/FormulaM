name: 📚 Documentation issue
description: Report unclear, missing, stale, or incorrect documentation.
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which file, section, or text needs attention?
      placeholder: "Example: README.md, Scientific disclaimer, CONTRIBUTING.md"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, stale, or incorrect?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Suggest wording or describe the correction.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - Local development
        - Checks or CI
        - Scientific behavior
        - Formula search usage
        - Spectrum import/export
        - Contribution process
        - Deployment
        - Other
    validations:
      required: false
